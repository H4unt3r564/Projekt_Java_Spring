
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Mapa</title>

    <link rel="stylesheet" th:href="@{/map.css}">

</head>

<body>

<div class="world">

    <div class="map" id="map">

        <div
                th:each="v : ${villages}"
                class="village"

                th:attr="data-id=${v.villageID}"

                th:title="${v.name + ' (' + v.x + '|' + v.y + ')'}"

                th:style="'left:' + (${v.x} * 5) + 'px; top:' + (${v.y} * 5) + 'px;'">

            <a th:href="@{/wioska(id=${v.villageID})}">
                🏠
            </a>

        </div>

    </div>

</div>

<div id="contextMenu" class="context-menu">

    <a id="visitLink">
        🏠 Odwiedź
    </a>

    <a id="attackLink">
        ⚔ Atakuj
    </a>

</div>

<script>

    const map = document.getElementById("map");

    let isDragging = false;

    let startX;
    let startY;

    let offsetX = 0;
    let offsetY = 0;

    map.style.transform =
        `translate(${offsetX}px, ${offsetY}px)`;

    document.addEventListener("mousedown", e => {

        if(e.button !== 0) return;

        isDragging = true;

        startX = e.clientX - offsetX;
        startY = e.clientY - offsetY;

        document.body.style.cursor = "grabbing";
    });

    document.addEventListener("mouseup", () => {

        isDragging = false;

        document.body.style.cursor = "grab";
    });

    document.addEventListener("mousemove", e => {

        if(!isDragging) return;

        offsetX = e.clientX - startX;
        offsetY = e.clientY - startY;

        map.style.transform =
            `translate(${offsetX}px, ${offsetY}px)`;
    });

    const contextMenu =
        document.getElementById("contextMenu");

    const visitLink =
        document.getElementById("visitLink");

    const attackLink =
        document.getElementById("attackLink");

    document.querySelectorAll(".village")
        .forEach(village => {

            village.addEventListener(
                "contextmenu",
                function(e){

                    e.preventDefault();

                    const villageId =
                        this.dataset.id;

                    contextMenu.style.display =
                        "block";

                    contextMenu.style.left =
                        e.pageX + "px";

                    contextMenu.style.top =
                        e.pageY + "px";

                    visitLink.href =
                        "/wioska?id=" + villageId;

                    attackLink.href =
                        "/attack?targetVillageId=" +
                        villageId;
                }
            );

        });

    document.addEventListener(
        "click",
        () => {

            contextMenu.style.display =
                "none";
        }
    );

</script>

</body>

</html>

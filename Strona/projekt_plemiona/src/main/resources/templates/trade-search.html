<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Wyszukaj gracza</title>

    <link rel="stylesheet" th:href="@{/css/trade-search.css}">
    <link rel="stylesheet" th:href="@{/css/navbar.css}">
</head>
<body>

<div id="header">

    <button id="menuBtn" class="menu-btn">
        ☰
    </button>

    <div id="sidebar" class="sidebar">

        <div class="sidebar-header">
            Menu
            <button id="sidebar_close">✖</button>
        </div>

        <a href="/wioska">Wioska</a>
        <a href="/attack-search">Atak</a>
        <a href="/units">Jednostki</a>
        <a href="/map">Mapa</a>
        <a href="/trade/search">Handel</a>
        <a href="/reports">Raporty</a>
        <a
                th:if="${!hasTribe}"
                th:href="@{/tribe/create}">
            Utwórz gildię
        </a>

        <a
                th:if="${hasTribe}"
                th:href="@{/tribe(tribeId=${tribeId})}">
            Moja gildia
        </a>
        <a href="/login">Wyloguj</a>

    </div>

    <div id="village-player-info">
        Handel
    </div>

    <div class="header-placeholder"></div>

</div>

<div class="search-container">

    <h1>📦 Handel 📦</h1>

    <p class="subtitle">
        Wpisz nazwę gracza, z którym chcesz handlować
    </p>

    <form action="/trade/search" method="get">

        <input
                type="text"
                name="username"
                placeholder="Nazwa gracza"
                required>

        <button type="submit">
            Wyszukaj
        </button>

    </form>

</div>

<script>

    const sidebar =
        document.getElementById("sidebar");

    document
        .getElementById("menuBtn")
        .addEventListener("click", () => {
            sidebar.classList.add("open");
        });

    document
        .getElementById("sidebar_close")
        .addEventListener("click", () => {
            sidebar.classList.remove("open");
        });

</script>

</body>
</html>

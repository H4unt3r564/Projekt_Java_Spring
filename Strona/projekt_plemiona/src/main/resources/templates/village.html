<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Wioska</title>
    <link rel="stylesheet" th:href="@{/css/village.css}">
</head>
<body>

<div th:if="${error}" class="error-box">
    <span th:text="${error}"></span>
    <br/>
</div>

<h1>Wioska gracza</h1>

<p>Username: <span th:text="${player.username}"></span></p>
<p>Email: <span th:text="${player.email}"></span></p>

<hr>

<div class="village-grid">

    <div th:each="b : ${buildings}"
         class="tile">

        <!-- ICON -->
        <div class="icon">

            <span th:if="${b.buildingType.name == 'Lumber Mill'}">
                🪵
            </span>

            <span th:if="${b.buildingType.name == 'Clay Pit'}">
                🧱
            </span>

            <span th:if="${b.buildingType.name == 'Iron Mine'}">
                ⛓️
            </span>

            <span th:if="${b.buildingType.name == 'Farm'}">
                🌾
            </span>

            <span th:if="${b.buildingType.name == 'Barracks'}">
                🏹
            </span>

            <span th:if="${b.buildingType.name == 'Headquarters'}">
                🏰
            </span>

            <span th:if="${b.buildingType.name == 'Wall'}">
                🛡️
            </span>

            <span th:if="${b.buildingType.name == 'Warehouse'}">
                📦
            </span>

        </div>

        <!-- LEVEL -->
        <div class="lvl"
             th:text="'Lv ' + ${b.levelNumber}">
        </div>

        <!-- HOVER MENU -->
        <div class="menu">

            <div class="title"
                 th:text="${b.buildingType.name}">
            </div>

            <div th:text="'Level: ' + ${b.levelNumber}">
            </div>

            <div th:if="${isOwner}">

                <form th:action="@{/building/upgrade}"
                      method="post">

                    <input type="hidden"
                           name="villageId"
                           th:value="${village.villageId}" />

                    <input type="hidden"
                           name="buildingTypeId"
                           th:value="${b.buildingType.typeId}" />

                    <button class="upgrade-btn"
                            type="submit">

                        Upgrade

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

<hr>

<h2>Dane wioski</h2>

<p>ID: <span th:text="${village.villageId}"></span></p>
<p>Nazwa: <span th:text="${village.name}"></span></p>

<p>X: <span th:text="${village.coordinateX}"></span></p>
<p>Y: <span th:text="${village.coordinateY}"></span></p>

<p>Kontynent: <span th:text="${village.continent}"></span></p>
<h2>Zasoby</h2>

<p>Drewno:
    <span id="wood"
          th:text="${village.wood}"
          th:attr="data-value=${village.wood},
          data-rate=${woodPerHour ?: 0},
          data-max=${maxStorage},
          data-last=${village.lastUpdate}">
    </span>
</p>

<p>Glina:
    <span id="clay"
          th:text="${village.clay}"
          th:attr="data-value=${village.clay},
          data-rate=${clayPerHour ?: 0},
          data-max=${maxStorage},
          data-last=${village.lastUpdate}">
    </span>
</p>

<p>Żelazo:
    <span id="iron"
          th:text="${village.iron}"
          th:attr="data-value=${village.iron},
          data-rate=${woodPerHour ?: 0},
          data-max=${maxStorage},
          data-last=${village.lastUpdate}">
    </span>
</p>


<hr>

<h2>Kolejka budowy</h2>

<table th:if="${!#lists.isEmpty(queue)}">
    <tr>
        <th>Budynek</th>
        <th>Poziom</th>
        <th>Koniec</th>
    </tr>

    <tr th:each="q : ${queue}">
        <td th:text="${q.buildingName}"></td>
        <td th:text="${q.targetLevel}"></td>
        <td th:text="${#temporals.format(q.finishTime, 'dd-MM-yyyy HH:mm:ss')}"></td>
    </tr>
</table>

<div th:if="${#lists.isEmpty(queue)}">
    Brak budowy w kolejce
</div>

<script>

    function createResource(id) {
        const el = document.getElementById(id);

        return {
            el,
            value: Number(el.dataset.value),
            rate: Number(el.dataset.rate),
            max: Number(el.dataset.max),
            last: new Date(el.dataset.last).getTime()
        };
    }

    function calculate(r) {
        const now = Date.now();
        const elapsedSeconds = (now - r.last) / 1000;

        let value = r.value + (r.rate * elapsedSeconds / 3600);

        if (value > r.max) value = r.max;

        return value;
    }

    function render(r) {
        r.el.innerText = Math.floor(r.display);
    }

    const wood = createResource("wood");
    const clay = createResource("clay");
    const iron = createResource("iron");

    setInterval(() => {

        [wood, clay, iron].forEach(r => {
            r.display = calculate(r);
            render(r);
        });

    }, 1000);

</script>
</body>
</html>

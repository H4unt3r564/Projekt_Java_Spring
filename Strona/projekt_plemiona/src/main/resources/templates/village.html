<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Wioska</title>
    <link rel="stylesheet" th:href="@{/village.css}">
</head>
<body>

<div th:if="${error}" class="error-box">
    <span th:text="${error}"></span>
    <br/>
</div>

<h1>Wioska gracza</h1>

<p>Username: <span th:text="${player.username}"></span></p>
<p>Email: <span th:text="${player.email}"></span></p>

<hr>

<div class="village-grid">

    <div th:each="b : ${buildings}"
         class="tile"
         th:classappend="${b.buildingType.name.toUpperCase()}">

        <!-- ICON -->
        <div class="icon">
            <span th:switch="${b.buildingType.name.toUpperCase()}">
                <span th:case="'FARM'">🌾</span>
                <span th:case="'BARRACKS'">🏹</span>
                <span th:case="'HEADQUARTERS'">🏰</span>
                <span th:case="'WALL'">🧱</span>
                <span th:case="'WAREHOUSE'">📦</span>
                <span th:case="*">🏠</span>
            </span>
        </div>

        <!-- LEVEL -->
        <div class="lvl" th:text="'Lv ' + ${b.levelNumber}"></div>

        <!-- HOVER MENU -->
        <div class="menu">

            <div class="title" th:text="${b.buildingType.name}"></div>
            <div th:text="'Level: ' + ${b.levelNumber}"></div>

            <form th:action="@{/building/upgrade}" method="post">
                <input type="hidden" name="villageId" th:value="${village.villageId}" />
                <input type="hidden" name="buildingTypeId" th:value="${b.buildingType.typeId}" />

                <button class="upgrade-btn" type="submit">
                    Upgrade
                </button>
            </form>

        </div>

    </div>

</div>

<hr>

<h2>Dane wioski</h2>

<p>ID: <span th:text="${village.villageId}"></span></p>
<p>Nazwa: <span th:text="${village.name}"></span></p>
<p>Kontynent: <span th:text="${village.continent}"></span></p>

<h2>Zasoby</h2>

<p>Drewno: <span id="wood" th:text="${village.wood}"></span></p>
<p>Glina: <span id="clay" th:text="${village.clay}"></span></p>
<p>Żelazo: <span id="iron" th:text="${village.iron}"></span></p>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Wioska</title>
    <link rel="stylesheet" th:href="@{/css/village.css}">
    <script th:src="@{/js/villageScript.js}" defer></script>
</head>
<body>

<div th:if="${error}" class="error-box">
    <span th:text="${error}"></span>
    <br/>
</div>


<div id="header">

    <button id="menuBtn" class="menu-btn">
        ☰
    </button>

    <div id="sidebar" class="sidebar">

        <div class="sidebar-header">
            Menu
            <button id="sidebar_close">✖</button>
        </div>

        <a th:href="@{/wioska?{id}(id=${village.villageId})}">Wioska</a>
        <a th:href="@{/attack-search}">Atak</a>
        <a th:href="@{/units}">Jednostki</a>
        <a th:href="@{/map}">Mapa</a>
        <a th:href="@{/trade}">Handel</a>
        <a th:href="@{/reports}">Raporty</a>
        <a th:href="@{/login}">Wyloguj</a>

    </div>


    <div id="village-player-info">
        Wioska gracza -
        <span th:text="${player.username}"></span>
        (
        <span th:text="${village.coordinateX}"></span>
        |
        <span th:text="${village.coordinateY}"></span>
        )
    </div>

    <div class="resources-bar">

        <div class="resource">
            🪵 Drewno:
            <span id="wood"
                  th:text="${village.wood}"
                  th:attr="data-value=${village.wood},
                data-rate=${woodPerHour ?: 0},
                data-max=${maxStorage},
                data-last=${village.lastUpdate}">
            </span>
        </div>

        <div class="resource">
            🧱 Glina:
            <span id="clay"
                  th:text="${village.clay}"
                  th:attr="data-value=${village.clay},
                data-rate=${clayPerHour ?: 0},
                data-max=${maxStorage},
                data-last=${village.lastUpdate}">
            </span>
        </div>

        <div class="resource">
            ⛓️ Żelazo:
            <span id="iron"
                  th:text="${village.iron}"
                  th:attr="data-value=${village.iron},
                data-rate=${ironPerHour ?: 0},
                data-max=${maxStorage},
                data-last=${village.lastUpdate}">
            </span>
        </div>
    </div>
</div>


<div class="village-map">

    <svg class="terrain"
         viewBox="0 0 1200 800"
         preserveAspectRatio="xMidYMid slice">

        <image
                href="/css/tloWioski.png"
                width="1200"
                height="800"/>
    </svg>


    </svg>

    <div th:each="b : ${buildings}"
         class="building-node">

        <div class="building-circle">

            <span th:if="${b.buildingType.name == 'Lumber Mill'}">
                <img th:src="@{/css/lumberMill.png}"/>
            </span>

            <span th:if="${b.buildingType.name == 'Clay Pit'}">
                <img th:src="@{/css/clayPit.png}"/>
            </span>
            <span th:if="${b.buildingType.name == 'Iron Mine'}">
                <img th:src="@{/css/ironMine.png}"/>
            </span>
            <span th:if="${b.buildingType.name == 'Farm'}">
                <img th:src="@{/css/farm.png}"/>
            </span>
            <span th:if="${b.buildingType.name == 'Barracks'}">
                <img th:src="@{/css/barracks.png}"/>
            </span>
            <span th:if="${b.buildingType.name == 'Headquarters'}">
                <img th:src="@{/css/headquarters.png}"/>
            </span>
            <span th:if="${b.buildingType.name == 'Wall'}">
                <img th:src="@{/css/wall.png}"/>
            </span>
            <span th:if="${b.buildingType.name == 'Warehouse'}">
                <img th:src="@{/css/warehouse.png}"/>
            </span>

        </div>

        <div class="lvl"
             th:text="${b.levelNumber}">
        </div>

<!--        <div class="building-label"-->
<!--             th:text="${b.buildingType.name}">-->
<!--        </div>-->

        <div class="modal">
            <div id="modal_header">
                <h3 th:text="${b.buildingType.name}"></h3>

                <button class="modal_close">✖</button>
            </div>

            <p>
                Poziom:
                <span th:text="${b.levelNumber}"></span>
            </p>

            <div th:if="${finishTimes[b.buildingType.typeId.longValue()] != null}">
                <div th:each="q : ${finishTimes[b.buildingType.typeId.longValue()]}">
                    🕒 Czas ukończenia: <span th:text="${#temporals.format(q.finishTime, 'HH:mm:ss')}"></span>
                </div>
            </div>

            <div th:if="${finishTimes[b.buildingType.typeId.longValue()] == null}">
                Brak aktywnego ulepszenia
            </div>

            <form th:if="${isOwner}"
                  th:action="@{/building/upgrade}"
                  method="post">

                <input type="hidden"
                       name="villageId"
                       th:value="${village.villageId}"/>

                <input type="hidden"
                       name="buildingTypeId"
                       th:value="${b.buildingType.typeId}"/>

                <div id="upgrade_panel">
                    Koszt rozbudowy do poziomu <span th:text="${b.levelNumber + 1}"></span>:
                    <div class="modal_resource">
                        🪵 Drewno:
                        <span class="wood-value"></span>
                        /
                        <span th:text="${T(java.lang.Math).round(100 * T(java.lang.Math).pow(1.25, b.levelNumber))}"></span>
                    </div>
                    <div class="modal_resource">
                        🧱 Glina:
                        <span class="clay-value"></span>
                        /
                        <span th:text="${T(java.lang.Math).round(100 * T(java.lang.Math).pow(1.25, b.levelNumber))}"></span>
                    </div>
                    <div class="modal_resource">
                        ⛓️ Żelazo:
                        <span class="iron-value"></span>
                        /
                        <span th:text="${T(java.lang.Math).round(100 * T(java.lang.Math).pow(1.25, b.levelNumber))}"></span>
                    </div>
                </div>
                <button class="upgrade-btn">
                    Rozbuduj do poziomu <span th:text="${b.levelNumber + 1}"></span>
                </button>

            </form>

        </div>

    </div>

</div>

</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Wyszukiwanie celu</title>

    <link rel="stylesheet" th:href="@{/css/attack-search.css}">
    <link rel="stylesheet" th:href="@{/css/navbar.css}">
</head>
<body>

<div id="header">

    <button id="menuBtn" class="menu-btn">
        ☰
    </button>

    <div id="sidebar" class="sidebar">

        <div class="sidebar-header">
            Menu
            <button id="sidebar_close">✖</button>
        </div>

        <a href="/wioska">Wioska</a>
        <a href="/attack-search">Atak</a>
        <a href="/units">Jednostki</a>
        <a href="/map">Mapa</a>
        <a href="/trade">Handel</a>
        <a href="/reports">Raporty</a>
        <a href="/login">Wyloguj</a>

    </div>

    <div id="village-player-info">
        Atak
    </div>

</div>

<div class="search-container">

    <h1>⚔ Znajdź cel ataku ⚔</h1>

    <p class="subtitle">
        Wpisz nazwę gracza, którego chcesz zaatakować
    </p>

    <form action="/attack/search" method="get">

        <input
                type="text"
                name="username"
                placeholder="Nazwa gracza"
                required>

        <button type="submit">
            Wyszukaj
        </button>

    </form>

</div>

<script>

    const sidebar =
        document.getElementById("sidebar");

    document
        .getElementById("menuBtn")
        .addEventListener("click", () => {

            sidebar.classList.add("open");
        });

    document
        .getElementById("sidebar_close")
        .addEventListener("click", () => {

            sidebar.classList.remove("open");
        });

</script>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">

    <title>Utwórz Gildię</title>

    <link rel="stylesheet" th:href="@{/css/navbar.css}">
    <link rel="stylesheet" th:href="@{/css/tribe.css}">
</head>
<body>

<div id="header">

    <button id="menuBtn" class="menu-btn">
        ☰
    </button>

    <div id="sidebar" class="sidebar">

        <div class="sidebar-header">
            Menu
            <button id="sidebar_close">✖</button>
        </div>

        <a href="/wioska">Wioska</a>
        <a href="/attack-search">Atak</a>
        <a href="/units">Jednostki</a>
        <a href="/map">Mapa</a>
        <a href="/trade">Handel</a>
        <a href="/reports">Raporty</a>

        <a
                th:if="${!hasTribe}"
                th:href="@{/tribe/create}">
            Utwórz gildię
        </a>

        <a
                th:if="${hasTribe}"
                th:href="@{/tribe(tribeId=${tribeId})}">
            Moja gildia
        </a>

        <a href="/login">Wyloguj</a>

    </div>

    <div id="village-player-info">
        Utwórz Gildię
    </div>

</div>

<div class="tribe-container">

    <h1>⚔️ Utwórz Gildię ⚔️</h1>

    <form
            class="create-tribe-form"
            action="/tribe/create"
            method="post">

        <div class="form-group">

            <label>Nazwa gildii</label>

            <input
                    type="text"
                    name="name"
                    placeholder="Nazwa gildii"
                    required>

        </div>

        <div class="form-group">

            <label>Tag</label>

            <input
                    type="text"
                    name="tag"
                    placeholder="TAG"
                    maxlength="5"
                    required>

        </div>

        <div class="buttons">

            <button type="submit">
                Utwórz gildię
            </button>

            <button
                    type="button"
                    onclick="location.href='/wioska'">

                ← Wróć do wioski

            </button>

        </div>

    </form>

</div>

<script>

    const sidebar =
        document.getElementById("sidebar");

    document
        .getElementById("menuBtn")
        .addEventListener("click", () => {

            sidebar.classList.add("open");

        });

    document
        .getElementById("sidebar_close")
        .addEventListener("click", () => {

            sidebar.classList.remove("open");

        });

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rejestracja</title>
    <link rel="stylesheet" th:href="@{/css/rejestracja.css}">
</head>
<body>
<div id="container">

    <div id="header">
        <span>PLEMIONA</span>
        <br/>
        <span>Witaj w świecie średniowiecznych wojen!</span>
    </div>

    <div th:if="${error}" style="color:red; margin-bottom:15px;">
        <span th:text="${error}"></span>
    </div>

    <form method="post" action="/rejestracja">
        <label for="email">Email:</label>
        <input type="text"
               name="email"
               id="email"
               required>
        <br/>

        <label for="username">Login:</label>
        <input type="text"
               name="username"
               id="username"
               pattern="(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}"
               title="Minimum 8 znaków, 1 mała litera, 1 duża litera i 1 cyfra"
               required>
        <br/>

        <label for="password">Hasło:</label>
        <input type="password"
               name="password"
               id="password"
               pattern="(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}"
               title="Minimum 8 znaków, 1 mała litera, 1 duża litera i 1 cyfra"
               required>
        <br/>

        <div id="buttons">
            <button type="submit">Zarejestruj</button>
            <a class="btn" th:href="@{/login}">Logowanie</a>
        </div>

    </form>


</div>

</body>
</html>
